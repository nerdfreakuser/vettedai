redirectsOrigin = "inline"
headersOrigin = "inline"

[functions]

  [functions."*"]

[[plugins]]
origin = "default"
package = "@netlify/plugin-nextjs"

  [plugins.inputs]

[build]
publish = "D:\\Downloads\\openclaw\\cashclaw\\out"
publishOrigin = "config"
commandOrigin = "config"
command = "npm run build"

  [build.environment]

  [build.processing]

    [build.processing.css]

    [build.processing.html]

    [build.processing.images]

    [build.processing.js]

  [build.services]

[[headers]]
for = "/vettedai/_next/static/*"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
from = "/vettedai/*/__next.*.txt"
to = "/vettedai/index.html"
status = 200
force = false

  [redirects.query]

  [redirects.conditions]

  [redirects.headers]

[[redirects]]
from = "/vettedai/_next/image"
to = "/vettedai/.netlify/images?url=:url&w=:width&q=:quality"
status = 200
force = false

  [redirects.query]
  url = ":url"
  w = ":width"
  q = ":quality"

  [redirects.conditions]

  [redirects.headers]

[[redirects]]
from = "/vettedai/_ipx/*"
to = "/vettedai/.netlify/images?url=:url&w=:width&q=:quality"
status = 200
force = false

  [redirects.query]
  url = ":url"
  w = ":width"
  q = ":quality"

  [redirects.conditions]

  [redirects.headers]